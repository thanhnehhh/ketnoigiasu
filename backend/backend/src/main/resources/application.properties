# ==================== SERVER ====================
server.port=8080
server.servlet.context-path=/

# ==================== DATABASE ====================
spring.datasource.url=jdbc:mysql://localhost:3306/ketnoigiasu_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==================== JWT ====================
jwt.secret=ketnoigiasu2026_super_secret_key_very_long_and_secure_change_in_production
jwt.expiration=86400000

# ==================== CORS (Frontend React - Vite th??ng d¨ng port 5173) ====================
spring.mvc.cors.allowed-origins=http://localhost:5173,http://localhost:3000
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true

# ==================== LOGGING ====================
logging.level.root=INFO
logging.level.com.thanh.ketnoigiasubackend=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ==================== DevTools (t¨y ch?n) ====================
spring.devtools.restart.enabled=true